<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Serviços | Painel Administrativo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/servicos.css">
</head>

<body>

<div class="admin-container">

    <aside class="sidebar">

        <div class="logo">
            <h2>Soraya Arruda</h2>
            <p>Painel Administrativo</p>
        </div>

        <nav class="menu">

            <a href="dashboard.html">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </a>

            <a href="agenda.html">
                <i class="fa-solid fa-calendar-days"></i>
                Agenda
            </a>

            <a href="clientes.html">
                <i class="fa-solid fa-users"></i>
                Clientes
            </a>

            <a href="servicos.html" class="ativo">
                <i class="fa-solid fa-hand-sparkles"></i>
                Serviços
            </a>

            <a href="configuracoes.html">
                <i class="fa-solid fa-gear"></i>
                Configurações
            </a>

            <hr>

            <a href="../index.html">
                <i class="fa-solid fa-house"></i>
                Voltar ao Site
            </a>

            <a href="#" id="btnSair">
                <i class="fa-solid fa-right-from-bracket"></i>
                Sair
            </a>

        </nav>

    </aside>

    <main class="content">

        <header class="page-header">

            <div>
                <h1>Serviços</h1>
                <p>Gerencie todos os serviços oferecidos pela Soraya Arruda.</p>
            </div>

            <button class="btn-novo" id="abrirModalServico">
                <i class="fa-solid fa-plus"></i>
                Novo Serviço
            </button>

        </header>

        <section class="barra-pesquisa">

            <div class="campo-busca">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="buscarServico" placeholder="Pesquisar serviço...">
            </div>

        </section>

        <section class="lista-servicos" id="listaServicos">
            <div class="mensagem-lista">Carregando serviços...</div>
        </section>

    </main>

</div>

<div class="modal" id="modalServico" aria-hidden="true">
    <div class="modal-conteudo">
        <div class="modal-header">
            <div>
                <h2 id="tituloModal">Novo Serviço</h2>
                <p>Preencha os dados do serviço.</p>
            </div>
            <button class="btn-fechar" id="fecharModalServico" aria-label="Fechar modal">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <form id="formServico">
            <input type="hidden" id="servicoId">

            <div class="grupo-form">
                <label for="nomeServico">Nome do serviço</label>
                <input type="text" id="nomeServico" placeholder="Ex: Mão" required>
            </div>

            <div class="grid-form">
                <div class="grupo-form">
                    <label for="categoriaServico">Categoria</label>
                    <input type="text" id="categoriaServico" placeholder="Ex: Mãos" required>
                </div>

                <div class="grupo-form">
                    <label for="tempoServico">Duração em minutos</label>
                    <input type="number" id="tempoServico" min="1" placeholder="60" required>
                </div>
            </div>

            <div class="grid-form">
                <div class="grupo-form">
                    <label for="valorServico">Valor</label>
                    <input type="number" id="valorServico" min="0" step="0.01" placeholder="25.00" required>
                </div>

                <div class="grupo-form">
                    <label for="statusServico">Status</label>
                    <select id="statusServico" required>
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                    </select>
                </div>
            </div>

            <div class="grupo-form">
                <label for="descricaoServico">Descrição / observação</label>
                <textarea id="descricaoServico" rows="3" placeholder="Observação opcional"></textarea>
            </div>

            <div class="modal-acoes">
                <button type="button" class="btn-cancelar" id="cancelarServico">Cancelar</button>
                <button type="submit" class="btn-salvar" id="btnSalvarServico">Salvar Serviço</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="../js/servicos.js"></script>

</body>
</html>
